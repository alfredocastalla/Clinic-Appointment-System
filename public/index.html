<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Appointment System - Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; }
        h1 { color: #333; margin-bottom: 30px; font-size: 2.5em; }
        .button-group { display: flex; flex-direction: column; gap: 15px; }
        .btn { padding: 15px 30px; border: none; border-radius: 5px; font-size: 1.1em; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s ease; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-primary:hover { background: #45a049; transform: translateY(-2px); }
        .btn-secondary { background: #2196F3; color: white; }
        .btn-secondary:hover { background: #0b7dda; transform: translateY(-2px); }
        .btn-accent { background: #FF9800; color: white; }
        .btn-accent:hover { background: #e68900; transform: translateY(-2px); }
        .description { color: #666; margin-bottom: 30px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Clinic Appointment System</h1>
        <p class="description">Welcome to our clinic management system. Please choose an option below to get started.</p>
        <div class="button-group">
            <a href="register-user.html" class="btn btn-primary">Register as User</a>
            <a href="register-doctor.html" class="btn btn-secondary">Register as Doctor</a>
            <a href="login.html" class="btn btn-accent">Login</a>
        </div>
    </div>

</body>
</html>
