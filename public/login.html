<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clinic Appointment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            max-width: 420px;
            width: 100%;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success {
            color: #2e7d32;
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        .error {
            color: #c62828;
            background: #ffebee;
            border: 1px solid #ffcdd2;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin: 0 8px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .divider {
            color: #ccc;
            margin: 0 4px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 24px;
            }

            .link {
                font-size: 13px;
            }

            .link a {
                display: block;
                margin: 8px 0;
            }

            .divider {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login</h1>
        <p class="subtitle">Sign in to your clinic account</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <div class="form-group">
                <label for="role">Login as</label>
                <select id="role" required>
                    <option value="">-- Select Role --</option>
                    <option value="user">Patient</option>
                    <option value="doctor">Doctor</option>
                </select>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div id="message"></div>
        <div class="link">
            <a href="index.html">← Back to Home</a>
            <span class="divider">|</span>
            <a href="register-user.html">Register (Patient)</a>
            <span class="divider">|</span>
            <a href="register-doctor.html">Register (Doctor)</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const roleSelect = document.getElementById('role');
        const messageDiv = document.getElementById('message');
        const loginBtn = form.querySelector('.btn');
        let isLoading = false;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Prevent double submission
            if (isLoading) return;

            // Validate inputs
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const role = roleSelect.value;

            if (!email || !password || !role) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            if (!email.includes('@')) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            isLoading = true;
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            clearMessage();

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token and user info in localStorage
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    const redirectUrl = data.user.role === 'doctor' ? 'doctor-dashboard.html' : 'user-dashboard.html';
                    showMessage(`Welcome, ${data.user.name}! Redirecting to dashboard...`, 'success');
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1500);
                } else {
                    showMessage(data.message || 'Login failed. Please check your credentials.', 'error');
                    isLoading = false;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Network error. Please try again.', 'error');
                isLoading = false;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        function showMessage(text, type) {
            messageDiv.innerHTML = `<div class="${type}">${text}</div>`;
        }

        function clearMessage() {
            messageDiv.innerHTML = '';
        }

        // Clear message when user starts typing
        [emailInput, passwordInput].forEach(input => {
            input.addEventListener('focus', clearMessage);
        });
    </script>
</body>
</html>
