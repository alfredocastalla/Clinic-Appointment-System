<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Doctor - Clinic Appointment System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 400px; width: 90%; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: #2196F3; outline: none; }
        .btn { width: 100%; padding: 15px; background: #2196F3; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #0b7dda; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #2196F3; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .success { color: green; text-align: center; margin-top: 15px; }
        .error { color: red; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧑‍⚕️ Register as Doctor</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="specialization">Specialization</label>
                <input type="text" id="specialization" placeholder="e.g., Cardiology, Pediatrics" required>
            </div>
            <div class="form-group">
                <label for="availableTime">Available Day & Time</label>
                <input type="text" id="availableTime" placeholder="e.g., Mon 10:00 - 14:00">
            </div>
            <button type="submit" class="btn">Register</button>
        </form>
        <div id="message"></div>
        <div class="link">
            <a href="index.html">← Back to Home</a> | <a href="login.html">Already have an account? Login</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const specialization = document.getElementById('specialization').value;
                const availableTime = document.getElementById('availableTime').value;

                try {
                    const response = await fetch('/auth/register/doctor', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password, specialization, availableTime })
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    const error = await response.json();
                    document.getElementById('message').innerHTML = '<div class="error">' + (error.message || 'Registration failed') + '</div>';
                }
            } catch (error) {
                document.getElementById('message').innerHTML = '<div class="error">Network error. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
